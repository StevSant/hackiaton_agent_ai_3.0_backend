# Cloud Build: build the backend image (docker/Dockerfile, context=backend/) and push to Artifact Registry.
# Used for the manual first deploy AND (later) the GitHub-connected trigger.
# Secrets are NOT here — they're set on the Cloud Run service (manual: --set-env-vars; trigger: --set-secrets from Secret Manager).
steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    env: ['DOCKER_BUILDKIT=1']
    args: ['build', '-f', 'docker/Dockerfile', '-t', '${_IMAGE}', '.']
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args: ['push', '${_IMAGE}']
images:
  - '${_IMAGE}'
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _IMAGE: 'us-central1-docker.pkg.dev/hackton-497606/fraudia/backend:latest'
